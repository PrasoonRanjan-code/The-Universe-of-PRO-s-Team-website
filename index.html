<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Status</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    /* VIDEO BACKGROUND */
    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      color: #22c55e;
      font-size: 30px;
      text-shadow: 0 0 10px #22c55e;
    }

    p {
      margin-top: 10px;
      font-size: 16px;
      color: #cbd5f5;
    }

    #countdown {
      margin-top: 15px;
      font-size: 18px;
      color: #22c55e;
      text-shadow: 0 0 10px #22c55e;
    }

    .footer {
      position: absolute;
      bottom: 15px;
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <!-- BACKGROUND VIDEO -->
  <video autoplay muted loop>
    <source src="hacker.mp4" type="video/mp4">
  </video>

  <div class="overlay">
    <h1>Website is Disactive</h1>
    <p>Please come tomorrow</p>

    <div id="countdown"></div>

    <div class="footer">
      Created by PrasoonRanjanPro <br>
      Idea by OM and Prasoon <br>
      Date: 04/04/2026
    </div>
  </div>

<script>
  const targetDate = new Date("April 4, 2026 00:00:00").getTime();

  const countdown = document.getElementById("countdown");

  setInterval(() => {
    const now = new Date().getTime();
    const distance = targetDate - now;

    if (distance < 0) {
      countdown.innerHTML = "Site is now active";
      return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    countdown.innerHTML = `Unlocks in: ${days}d ${hours}h ${minutes}m ${seconds}s`;
  }, 1000);
</script>

</body>
</html>
